// AI1〜5は「誰が勝った方から順に記録されたか」というバイアスがあるため、
// 個別の強さは無視し、AI全体の合算成績から算出した1つの固定レートを全AIに適用する。
const AI_FIXED_ELO = (() => {
  if (AI_COMBINED.games === 0) return BASE_ELO;
  const wr = AI_COMBINED.wins / AI_COMBINED.games;
  const shrink = Math.min(AI_COMBINED.games, 30) / 30;
  const adjWr = 0.5 + (wr - 0.5) * shrink;
  return Math.round(BASE_ELO + (adjWr - 0.5) * 600);
})();

function initialElo(name) {
  if (SEED_PLAYERS[name]?.isAI || name.startsWith("AI")) return AI_FIXED_ELO;
  const stats = SEED_PLAYERS[name] || { games: 0, wins: 0, losses: 0 };
  if (CHATGPT_RATING[name] !== undefined) {
    return Math.round(BASE_ELO + (CHATGPT_RATING[name] - 85) * 14);
  }
  if (stats.games === 0) return BASE_ELO;
  const wr = stats.wins / stats.games;
  const shrink = Math.min(stats.games, 30) / 30; // 少ない試合数ほど1500に寄せる
  const adjWr = 0.5 + (wr - 0.5) * shrink;
  return Math.round(BASE_ELO + (adjWr - 0.5) * 600);
}

function normalizeForMatch(s) {
  return (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
}

// 画像/OCRから読み取った名前の表記ゆれ・誤読(例: "MJHotcake"→"MJ", "iselo2sei"→"isclo2sei")を、
// 既知のロスター名に寄せる。完全一致→部分一致→あいまい一致(編集距離)の順に試す。
function matchToRosterName(rawName) {
  const norm = normalizeForMatch(rawName);
  if (!norm || norm.length < 2) return null;

  for (const n of ALL_NAMES) {
    if (normalizeForMatch(n) === norm) return n;
  }
  for (const n of ALL_NAMES) {
    const nNorm = normalizeForMatch(n);
    if (nNorm.length >= 2 && (norm.includes(nNorm) || nNorm.includes(norm))) return n;
  }
  let best = null;
  let bestDist = Infinity;
  ALL_NAMES.forEach((n) => {
    const nNorm = normalizeForMatch(n);
    if (nNorm.length < 4) return; // 短い名前は誤爆しやすいのであいまい一致の対象外
    const dist = levenshtein(norm, nNorm);
    const threshold = Math.max(1, Math.floor(nNorm.length / 4));
    if (dist <= threshold && dist < bestDist) {
      best = n;
      bestDist = dist;
    }
  });
  return best;
}

// スコアボード画像をApps Script経由でGoogleドライブの無料OCRにかけ、テキストを取得する
async function ocrExtractText(base64Data, mediaType) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ type: "ocr_extract", image: base64Data, mediaType: mediaType || "image/png" }),
  });
  const raw = await res.text();
  let data;
  try {
    data = JSON.parse(raw);
  } catch (e) {
    throw new Error("サーバーの応答がJSONではありません: " + raw.slice(0, 300));
  }
  if (data.error) throw new Error(data.error);
  return data.text || "";
}

// OCRテキストを解析する。Googleドライブ経由のOCRは表組みを「名前の行→数値が1個ずつ並ぶ行」の
// ように1列にバラして返すことが多いため、行を先頭から走査し、
// ロスター名の行を見つけたら続く数値行を最大5個(軍事/経済/テクノロジー/社会/総合)拾う方式にしている。
// レイアウト崩れなどで誤読することもあるため、あくまで下書き用。保存前に必ず確認・修正が必要。
function parseScoresFromOcrText(text) {
  const lines = text
    .split(/\r?\n/)
    .map((l) => l.trim())
    .filter(Boolean);
  const results = [];
  let i = 0;
  while (i < lines.length) {
    const rn = matchToRosterName(lines[i]);
    if (!rn) {
      i++;
      continue;
    }
    const nums = [];
    let j = i + 1;
    while (j < lines.length && nums.length < 5) {
      const tok = lines[j].replace(/[,，]/g, "");
      if (/^\d+$/.test(tok)) {
        nums.push(Number(tok));
        j++;
      } else if (matchToRosterName(lines[j])) {
        break; // 次のプレイヤー行に到達したので打ち切り
      } else {
        j++; // アイコンの誤読などのゴミ行はスキップ
      }
    }
    if (nums.length > 0) {
      const [military = 0, economy = 0, tech = 0, society = 0] = nums;
      results.push({ name: rn, military, economy, tech, society });
    }
    i = j > i ? j : i + 1;
  }
  return results;
}

    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = () => reject(new Error("読み込みに失敗しました"));
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   集計ロジック: シード + 記録済み試合を通してElo・戦績・相性を再計算
   ============================================================ */
function computeAggregates(userMatches) {
  const players = {};
  ALL_NAMES.forEach((n) => {
    const seed = SEED_PLAYERS[n];
    players[n] = { games: seed.games, wins: seed.wins, losses: seed.losses, elo: initialElo(n), isAI: seed.isAI, scoreHistory: [] };
  });
  const teammate = {};
  Object.entries(SEED_TEAMMATE).forEach(([k, v]) => (teammate[k] = { ...v }));
  const h2h = {};
  Object.entries(SEED_H2H).forEach(([k, v]) => (h2h[k] = { ...v }));

  const ensurePlayer = (n) => {
    if (!players[n]) players[n] = { games: 0, wins: 0, losses: 0, elo: BASE_ELO, isAI: n.startsWith("AI"), scoreHistory: [] };
  };

  const matches = [...SEED_MATCHES, ...userMatches];

  matches.forEach((m) => {
    const teamA = m.teamA || [];
    const teamB = m.teamB || [];
    teamA.concat(teamB).forEach(ensurePlayer);
    if (teamA.length === 0 || teamB.length === 0) return;

    const avgElo = (team) => team.reduce((s, n) => s + players[n].elo, 0) / team.length;
    const eloA = avgElo(teamA);
    const eloB = avgElo(teamB);
    const expectedA = 1 / (1 + Math.pow(10, (eloB - eloA) / 400));
    let actualA = 0.5;
    if (m.winner === "A") actualA = 1;
    else if (m.winner === "B") actualA = 0;

    const deltaA = Math.round(K_FACTOR * (actualA - expectedA));
    teamA.forEach((n) => { if (!players[n].isAI) players[n].elo += deltaA; });
    teamB.forEach((n) => { if (!players[n].isAI) players[n].elo -= deltaA; });

    if (m.winner === "A" || m.winner === "B") {
      teamA.forEach((n) => {
        players[n].games += 1;
        if (m.winner === "A") players[n].wins += 1;
        else players[n].losses += 1;
      });
      teamB.forEach((n) => {
        players[n].games += 1;
        if (m.winner === "B") players[n].wins += 1;
        else players[n].losses += 1;
      });
      if (m.scores) {
        Object.entries(m.scores).forEach(([n, s]) => {
          ensurePlayer(n);
          const total = (s.military || 0) + (s.economy || 0) + (s.tech || 0) + (s.society || 0);
          players[n].scoreHistory.push({ matchId: m.id, date: m.date, total, ...s });
        });
      }
      // チームメイト
      [teamA, teamB].forEach((team) => {
        const won = (team === teamA && m.winner === "A") || (team === teamB && m.winner === "B");
        for (let i = 0; i < team.length; i++) {
          for (let j = i + 1; j < team.length; j++) {
            const k = pairKey(team[i], team[j]);
            if (!teammate[k]) teammate[k] = { games: 0, wins: 0 };
            teammate[k].games += 1;
            if (won) teammate[k].wins += 1;
          }
        }
      });
      // 直接対決
      teamA.forEach((a) => {
        teamB.forEach((b) => {
          const [x, y] = [a, b].sort();
          const k = `${x}|${y}`;
          if (!h2h[k]) h2h[k] = { games: 0, aWins: 0 };
          h2h[k].games += 1;
          const winnerName = m.winner === "A" ? a : b;
          if (winnerName === x) h2h[k].aWins += 1;
        });
      });
    }
  });

  return { players, teammate, h2h };
}

/* ============================================================
   チーム分け候補生成
   ============================================================ */
function combinations(arr, k) {
  const result = [];
  const helper = (start, combo) => {
    if (combo.length === k) {
      result.push([...combo]);
      return;
    }
    for (let i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      helper(i + 1, combo);
      combo.pop();
    }
  };
  helper(0, []);
  return result;
}

function synergyScoreForTeam(team, teammateMap) {
  let score = 0;
  const notes = [];
  for (let i = 0; i < team.length; i++) {
    for (let j = i + 1; j < team.length; j++) {
      const k = pairKey(team[i], team[j]);
      const rec = teammateMap[k];
      if (rec && rec.games >= 6) {
        const wr = rec.wins / rec.games;
        const weight = Math.min(rec.games, 40);
        score += (wr - 0.5) * weight;
        if (wr >= 0.68) notes.push({ pair: [team[i], team[j]], wr, games: rec.games, type: "good" });
        if (wr <= 0.32) notes.push({ pair: [team[i], team[j]], wr, games: rec.games, type: "bad" });
      }
    }
  }
  return { score, notes };
}

function suggestSplits(selected, players, teammateMap) {
  if (selected.length < 2 || selected.length % 2 !== 0) return [];
  const half = selected.length / 2;
  const fixed = selected[0];
  const rest = selected.slice(1);
  const combosForFixedTeam = combinations(rest, half - 1);
  const seen = new Set();
  const splits = [];
  combosForFixedTeam.forEach((combo) => {
    const teamA = [fixed, ...combo].sort();
    const teamB = rest.filter((n) => !combo.includes(n)).sort();
    const key = teamA.join(",") + "/" + teamB.join(",");
    if (seen.has(key)) return;
    seen.add(key);

    const eloA = teamA.reduce((s, n) => s + (players[n]?.elo ?? BASE_ELO), 0) / teamA.length;
    const eloB = teamB.reduce((s, n) => s + (players[n]?.elo ?? BASE_ELO), 0) / teamB.length;
    const synA = synergyScoreForTeam(teamA, teammateMap);
    const synB = synergyScoreForTeam(teamB, teammateMap);
    const powerA = eloA + synA.score * 1.5;
    const powerB = eloB + synB.score * 1.5;
    const diff = Math.abs(powerA - powerB);

    splits.push({
      teamA, teamB, eloA, eloB, diff,
      notesA: synA.notes, notesB: synB.notes,
    });
  });
  splits.sort((a, b) => a.diff - b.diff);
  return splits.slice(0, 5);
}

const SCORE_FIELDS = [
  { key: "military", label: "軍事" },
  { key: "economy", label: "経済" },
  { key: "tech", label: "テクノロジー" },
  { key: "society", label: "社会" },
];

function AddMatch({ agg, onSave }) {
  const [teamA, setTeamA] = useState([]);
  const [teamB, setTeamB] = useState([]);
  const [winner, setWinner] = useState(null);
  const [date, setDate] = useState("");
  const [map, setMap] = useState("");
  const [notes, setNotes] = useState("");
  const [showScores, setShowScores] = useState(false);
  const [scores, setScores] = useState({});
  const [saved, setSaved] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [extractError, setExtractError] = useState(null);
  const [unmatchedNames, setUnmatchedNames] = useState([]);
  const [ocrDebugText, setOcrDebugText] = useState("");

  const toggle = (name, team) => {
    const inA = teamA.includes(name);
    const inB = teamB.includes(name);
    if (team === "A") {
      if (inA) setTeamA(teamA.filter((n) => n !== name));
      else { setTeamA([...teamA, name]); setTeamB(teamB.filter((n) => n !== name)); }
    } else {
      if (inB) setTeamB(teamB.filter((n) => n !== name));
      else { setTeamB([...teamB, name]); setTeamA(teamA.filter((n) => n !== name)); }
    }
  };

  const setScoreField = (name, field, value) => {
    setScores((prev) => ({
      ...prev,
      [name]: { ...prev[name], [field]: value === "" ? undefined : Number(value) },
    }));
  };

  const handleImageUpload = async (file) => {
    if (!file) return;
    setExtracting(true);
    setExtractError(null);
    setUnmatchedNames([]);
    setOcrDebugText("");
    try {
      const base64 = await fileToBase64(file);
      const text = await ocrExtractText(base64, file.type || "image/png");
      console.log("OCR raw text:\n" + text);
      const found = parseScoresFromOcrText(text);

      if (found.length === 0) {
        setExtractError("スコアを読み取れませんでした。手動で入力してください。下に読み取った生テキストを表示しています。");
        setOcrDebugText(text);
        return;
      }

      setScores((prev) => {
        const next = { ...prev };
        found.forEach((p) => {
          next[p.name] = { military: p.military, economy: p.economy, tech: p.tech, society: p.society };
        });
        return next;
      });
      setShowScores(true);
    } catch (e) {
      console.error("OCR抽出エラー:", e);
      setExtractError("画像の読み取りに失敗しました: " + (e && e.message ? e.message : String(e)));
    } finally {
      setExtracting(false);
    }
  };

  const handlePaste = (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (let i = 0; i < items.length; i++) {
      if (items[i].type.indexOf("image") !== -1) {
        const file = items[i].getAsFile();
        if (file) {
          e.preventDefault();
          handleImageUpload(file);
        }
        break;
      }
    }
  };

  const canSave = teamA.length > 0 && teamB.length > 0 && winner;
  const allPlayers = [...teamA, ...teamB];

  const handleSave = () => {
    if (!canSave) return;
    let cleanScores = null;
    if (showScores) {
      cleanScores = {};
      allPlayers.forEach((n) => {
        const s = scores[n];
        if (s && Object.values(s).some((v) => v !== undefined)) {
          cleanScores[n] = {
            military: s.military || 0,
            economy: s.economy || 0,
            tech: s.tech || 0,
            society: s.society || 0,
          };
        }
      });
      if (Object.keys(cleanScores).length === 0) cleanScores = null;
    }
    onSave({ id: Date.now(), date, map, teamA, teamB, winner, notes: notes || undefined, scores: cleanScores });
    setTeamA([]); setTeamB([]); setWinner(null); setDate(""); setMap(""); setNotes(""); setScores({}); setShowScores(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const roster = [...HUMAN_NAMES, ...AI_NAMES];

  return (
    <div>
      <h2 style={h2Style}>試合を記録</h2>
      <p style={subText}>参加者をチームA・チームBに振り分けて、勝敗を記録してください。保存すると各プレイヤーのレート・相性データが自動更新されます。AI1〜5は区別用のラベルで、強さはすべて同じものとして扱います。</p>

      <div
        style={{ ...cardStyle, marginTop: 16, marginBottom: 8 }}
        onPaste={handlePaste}
        tabIndex={0}
      >
        <label style={{ fontFamily: "'Cinzel', serif", fontWeight: 700, fontSize: 13, color: "#c9a227", display: "block", marginBottom: 8 }}>
          スコア画像から自動入力(軍事/経済/テクノロジー/社会)
        </label>
        <input
          type="file"
          accept="image/*"
          onChange={(e) => handleImageUpload(e.target.files[0])}
          style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: "#a89a86" }}
        />
        <div style={{ marginTop: 8, fontSize: 12, color: "#a89a86", fontFamily: "'Inter', sans-serif" }}>
          このカードをクリックしてから <kbd>Ctrl+V</kbd> でスクリーンショットを直接貼り付けることもできます。
        </div>
        {extracting && <div style={{ marginTop: 8, fontSize: 12, color: "#c9a227", fontFamily: "'Inter', sans-serif" }}>読み取り中...(数秒〜十数秒かかります)</div>}
        {extractError && <div style={{ marginTop: 8, fontSize: 12, color: "#c07a6f", fontFamily: "'Inter', sans-serif" }}>{extractError}</div>}
        {ocrDebugText && (
          <pre style={{ marginTop: 8, fontSize: 11, color: "#8b7a6b", background: "#171310", padding: 8, borderRadius: 6, whiteSpace: "pre-wrap", maxHeight: 200, overflow: "auto" }}>
            {ocrDebugText}
          </pre>
        )}
        {unmatchedNames.length > 0 && (
          <div style={{ marginTop: 8, fontSize: 12, color: "#c98a4b", fontFamily: "'Inter', sans-serif" }}>
            名前を特定できませんでした: {unmatchedNames.join(", ")}(下のボタンで手動追加してください)
          </div>
        )}
        <div style={{ marginTop: 8, fontSize: 11, color: "#665c4f", fontFamily: "'Inter', sans-serif" }}>
          OCR(文字読み取り)による下書きです。チーム分け・勝者は自動判定されません。読み取り結果は下のスコア欄に反映されるので、保存前に必ず内容を確認・修正してください。
        </div>
        {Object.keys(scores).length > 0 && (
          <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #3a3128" }}>
            <div style={{ fontSize: 11, color: "#8b7a6b", fontFamily: "'Inter', sans-serif", marginBottom: 6 }}>読み取り結果(A/Bボタンでチームに追加すると下の欄で編集できます):</div>
            {Object.entries(scores).map(([n, s]) => (
              <div key={n} style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: "#ede4d3" }}>
                {displayName(n)}: 軍{s.military ?? 0} / 経{s.economy ?? 0} / 技{s.tech ?? 0} / 社{s.society ?? 0}
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ display: "flex", gap: 12, margin: "16px 0" }}>
        <input placeholder="日付(任意, 例 7/5)" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle} />
        <input placeholder="マップ/文明メモ(任意)" value={map} onChange={(e) => setMap(e.target.value)} style={inputStyle} />
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
        {roster.map((n) => {
          const inA = teamA.includes(n);
          const inB = teamB.includes(n);
          return (
            <div key={n} style={{ display: "flex", alignItems: "center", gap: 4, background: "#2a2420", borderRadius: 8, padding: "4px 4px 4px 10px", border: "1px solid #4a4136" }}>
              <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#ede4d3", marginRight: 4 }}>{displayName(n)}</span>
              <Toggle label="A" active={inA} onClick={() => toggle(n, "A")} color="#8fa876" />
              <Toggle label="B" active={inB} onClick={() => toggle(n, "B")} color="#c98a4b" />
            </div>
          );
        })}
      </div>

      <div style={{ display: "flex", gap: 24, marginBottom: 20 }}>
        <TeamPreview title="Team A" names={teamA} color="#8fa876" agg={agg} />
        <TeamPreview title="Team B" names={teamB} color="#c98a4b" agg={agg} />
      </div>

      <div style={{ marginBottom: 20 }}>
        <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#a89a86", marginBottom: 8 }}>勝ったのは?</div>
        <div style={{ display: "flex", gap: 10 }}>
          <Toggle label="Team A 勝利" active={winner === "A"} onClick={() => setWinner("A")} color="#8fa876" />
          <Toggle label="Team B 勝利" active={winner === "B"} onClick={() => setWinner("B")} color="#c98a4b" />
        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <button
          onClick={() => setShowScores((v) => !v)}
          style={{ background: "none", border: "none", color: "#c9a227", fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer", padding: 0 }}
        >
          {showScores ? "▾ 詳細スコアを閉じる" : "▸ 詳細スコアを入力(任意)"}
        </button>

        {showScores && allPlayers.length > 0 && (
          <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 10 }}>
            {allPlayers.map((n) => {
              const s = scores[n] || {};
              const total = SCORE_FIELDS.reduce((sum, f) => sum + (s[f.key] || 0), 0);
              return (
                <div key={n} style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                  <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#ede4d3", width: 90 }}>{displayName(n)}</div>
                  {SCORE_FIELDS.map((f) => (
                    <div key={f.key} style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                      <label style={{ fontSize: 10, color: "#8b7a6b", fontFamily: "'Inter', sans-serif" }}>{f.label}</label>
                      <input
                        type="number"
                        value={s[f.key] ?? ""}
                        onChange={(e) => setScoreField(n, f.key, e.target.value)}
                        style={{ ...inputStyle, width: 80, padding: "6px 8px" }}
                      />
                    </div>
                  ))}
                  <div style={{ marginLeft: "auto", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#c9a227" }}>
                    総合 {total.toLocaleString()}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: "block", fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#a89a86", marginBottom: 6 }}>タイムライン・メモ(任意)</label>
        <textarea
          value={notes}
          onChange={(e) => setNotes(e.target.value)}
          placeholder="例: 帝王入り順、誰が中盤で伸びたか、荒らしを受けた人など"
          rows={3}
          style={{ ...inputStyle, width: "100%", resize: "vertical", fontFamily: "'Inter', sans-serif" }}
        />
      </div>

      <button onClick={handleSave} disabled={!canSave} style={{ ...primaryButton, opacity: canSave ? 1 : 0.4, cursor: canSave ? "pointer" : "not-allowed" }}>
        {saved ? "保存しました ✓" : "この試合を保存"}
      </button>
    </div>
  );
}

function TeamPreview({ title, names, color, agg }) {
  const avgElo = names.length ? Math.round(names.reduce((s, n) => s + (agg.players[n]?.elo ?? BASE_ELO), 0) / names.length) : 0;
  return (
    <div style={{ flex: 1, background: "#221d18", border: `1px solid ${color}44`, borderRadius: 10, padding: 14 }}>
      <div style={{ fontFamily: "'Cinzel', serif", fontWeight: 700, color, fontSize: 14, marginBottom: 8 }}>{title}</div>
      {names.length === 0 && <div style={{ color: "#665c4f", fontSize: 13 }}>未選択</div>}
      {names.map((n) => (
        <div key={n} style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#ede4d3", marginBottom: 4 }}>
          {displayName(n)} <span style={{ color: "#8b7a6b", fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>({Math.round(agg.players[n]?.elo ?? BASE_ELO)})</span>
        </div>
      ))}
      {names.length > 0 && (
        <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #3a3128", fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#a89a86" }}>
          平均レート: {avgElo}
        </div>
      )}
    </div>
  );
}

function TeamBuilder({ agg }) {
  const [selected, setSelected] = useState([]);
  const roster = [...HUMAN_NAMES, ...AI_NAMES].filter((n) => (agg.players[n]?.games ?? 0) > 0 || CHATGPT_RATING[n] !== undefined);

  const toggle = (n) => {
    setSelected((s) => (s.includes(n) ? s.filter((x) => x !== n) : [...s, n]));
  };

  const splits = useMemo(() => suggestSplits(selected, agg.players, agg.teammate), [selected, agg]);

  return (
    <div>
      <h2 style={h2Style}>チーム分け提案</h2>
      <p style={subText}>今日参加するメンバーを選んでください(偶数人数)。レート差が小さく、相性の悪い組み合わせが同じチームに固まらない案を上位から提案します。AI1〜5は強さがすべて同じものとして計算されます。</p>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, margin: "16px 0 24px" }}>
        {roster.map((n) => (
          <Toggle key={n} label={displayName(n)} active={selected.includes(n)} onClick={() => toggle(n)} />
        ))}
      </div>

      {selected.length % 2 !== 0 && selected.length > 0 && (
        <div style={{ color: "#c98a4b", fontFamily: "'Inter', sans-serif", fontSize: 13, marginBottom: 16 }}>
          人数が奇数です。AIを1体追加するか、メンバーを調整してください。
        </div>
      )}

      {splits.map((s, i) => (
        <div key={i} style={{ ...cardStyle, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontFamily: "'Cinzel', serif", fontWeight: 700, color: "#c9a227", fontSize: 14 }}>
              案 {i + 1}
            </span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#8b7a6b" }}>
              平均レート差 {Math.round(s.diff)}
            </span>
          </div>
          <div style={{ display: "flex", gap: 20 }}>
            <SplitTeam title="Team A" names={s.teamA} elo={s.eloA} color="#8fa876" notes={s.notesA} />
            <SplitTeam title="Team B" names={s.teamB} elo={s.eloB} color="#c98a4b" notes={s.notesB} />
          </div>
        </div>
      ))}

      {selected.length >= 2 && selected.length % 2 === 0 && splits.length === 0 && (
        <div style={{ color: "#a89a86", fontSize: 13 }}>候補を計算中、またはメンバーが足りません。</div>
      )}
    </div>
  );
}

function SplitTeam({ title, names, elo, color, notes }) {
  return (
    <div style={{ flex: 1 }}>
      <div style={{ fontFamily: "'Cinzel', serif", fontWeight: 700, color, fontSize: 13, marginBottom: 6 }}>
        {title} <span style={{ color: "#8b7a6b", fontFamily: "'JetBrains Mono', monospace", fontWeight: 400 }}>avg {Math.round(elo)}</span>
      </div>
      {names.map((n) => (
        <div key={n} style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#ede4d3" }}>{displayName(n)}</div>
      ))}
      {notes.map((note, idx) => (
        <div key={idx} style={{ marginTop: 6, fontSize: 11, fontFamily: "'Inter', sans-serif", color: note.type === "good" ? "#8fa876" : "#c07a6f" }}>
          {note.type === "good" ? "◎ 好相性" : "✕ 要注意"}: {displayName(note.pair[0])}×{displayName(note.pair[1])} ({(note.wr * 100).toFixed(0)}%, {note.games}戦)
        </div>
      ))}
    </div>
  );
}

function Synergy({ agg }) {
  const [focus, setFocus] = useState(null);
  const pairs = Object.entries(agg.teammate)
    .map(([k, v]) => ({ pair: k.split("|"), ...v, wr: v.games ? v.wins / v.games : 0 }))
    .filter((p) => p.games >= 5 && !p.pair.some((n) => SEED_PLAYERS[n]?.isAI))
    .filter((p) => !focus || p.pair.includes(focus))
    .sort((a, b) => b.games - a.games);

  const h2hList = Object.entries(agg.h2h)
    .map(([k, v]) => ({ pair: k.split("|"), ...v }))
    .filter((p) => p.games >= 5 && !p.pair.some((n) => SEED_PLAYERS[n]?.isAI))
    .filter((p) => !focus || p.pair.includes(focus))
    .sort((a, b) => b.games - a.games);

  return (
    <div>
      <h2 style={h2Style}>相性データ</h2>
      <p style={subText}>5戦以上のペアのみ表示しています。名前をクリックすると、その人が絡む組み合わせだけに絞り込めます。</p>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, margin: "16px 0 24px" }}>
        {HUMAN_NAMES.filter((n) => (agg.players[n]?.games ?? 0) > 0).map((n) => (
          <Toggle key={n} label={displayName(n)} active={focus === n} onClick={() => setFocus(focus === n ? null : n)} />
        ))}
      </div>

      <h3 style={h3Style}>チームメイト時の勝率</h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 28 }}>
        {pairs.map((p, i) => (
          <div key={i} style={{ ...cardStyle, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#ede4d3" }}>
              {displayName(p.pair[0])} × {displayName(p.pair[1])}
            </span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: p.wr >= 0.55 ? "#8fa876" : p.wr <= 0.45 ? "#c07a6f" : "#a89a86" }}>
              {p.games}戦 {(p.wr * 100).toFixed(1)}%
            </span>
          </div>
        ))}
      </div>

      <h3 style={h3Style}>直接対決</h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {h2hList.map((p, i) => {
          const bWins = p.games - p.aWins;
          return (
            <div key={i} style={{ ...cardStyle, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#ede4d3" }}>
                {displayName(p.pair[0])} vs {displayName(p.pair[1])}
              </span>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#a89a86" }}>
                {p.aWins}勝 - {bWins}勝 (計{p.games})
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   スタイル
   ============================================================ */
const h2Style = { fontFamily: "'Cinzel', serif", fontWeight: 700, fontSize: 20, color: "#ede4d3", letterSpacing: "0.02em", margin: 0 };
const h3Style = { fontFamily: "'Cinzel', serif", fontWeight: 700, fontSize: 14, color: "#c9a227", margin: "0 0 10px" };
const subText = { fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#a89a86", marginTop: 6, maxWidth: 640, lineHeight: 1.6 };
const cardStyle = { background: "#221d18", border: "1px solid #3a3128", borderRadius: 10, padding: "12px 16px" };
const inputStyle = { flex: 1, background: "#221d18", border: "1px solid #4a4136", borderRadius: 8, padding: "8px 12px", color: "#ede4d3", fontFamily: "'Inter', sans-serif", fontSize: 13, outline: "none" };
const primaryButton = { background: "linear-gradient(135deg,#d9b34a,#c98a4b)", color: "#1b1712", border: "none", borderRadius: 8, padding: "10px 22px", fontFamily: "'Cinzel', serif", fontWeight: 700, fontSize: 13, letterSpacing: "0.03em" };

// Google Apps Script のデプロイURL(.../exec)。設定するとFreeプランでもスプレッドシートに永続保存されます。
// 未設定の間はClaudeの共有ストレージ(要Pro以上)にフォールバックします。
const GAS_URL = "https://script.google.com/macros/s/AKfycbw0M_D_YU1ZU79PGtw3_hesCasn8kbKXFGE18REqgd3nbxy8a-kuSFo_Rim3BT6VX1_/exec";

async function loadMatches() {
  if (GAS_URL) {
    const res = await fetch(GAS_URL);
    const json = await res.json();
    return Array.isArray(json) ? json : [];
  }
  const r = await window.storage.get("aoe2_matches", true);
  return r && r.value ? JSON.parse(r.value) : [];
}

async function saveMatches(next) {
  if (GAS_URL) {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // プリフライトを避けるためtext/plainで送信
      body: JSON.stringify(next),
    });
    return;
  }
  await window.storage.set("aoe2_matches", JSON.stringify(next), true);
}

function MatchHistory({ matches, onDelete }) {
  const [confirmId, setConfirmId] = useState(null);

  return (
    <div>
      <h2 style={h2Style}>試合履歴</h2>
      <p style={subText}>
        ここに表示されるのは、あなたやお友達がこのツールから記録した試合です(過去221戦分の元データや、スコア画像から登録した最初の1戦はここには出ません)。
        誤って入力した試合は削除できます。削除するとレート・戦績・相性データも自動で再計算されます。
      </p>

      {matches.length === 0 && (
        <div style={{ color: "#665c4f", fontSize: 13, fontFamily: "'Inter', sans-serif", marginTop: 16 }}>
          まだ記録がありません。
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16 }}>
        {[...matches].reverse().map((m) => (
          <div key={m.id} style={cardStyle}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
              <div>
                <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: "#8b7a6b" }}>
                  {m.date || "日付なし"} {m.map ? `・${m.map}` : ""}
                </div>
                <div style={{ marginTop: 6, fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#ede4d3" }}>
                  <span style={{ color: m.winner === "A" ? "#8fa876" : "#a89a86" }}>
                    Team A{m.winner === "A" ? "(勝)" : ""}: {m.teamA.map(displayName).join(", ")}
                  </span>
                  <br />
                  <span style={{ color: m.winner === "B" ? "#8fa876" : "#a89a86" }}>
                    Team B{m.winner === "B" ? "(勝)" : ""}: {m.teamB.map(displayName).join(", ")}
                  </span>
                </div>
                {m.notes && (
                  <div style={{ marginTop: 6, fontSize: 12, color: "#8b7a6b", fontFamily: "'Inter', sans-serif" }}>{m.notes}</div>
                )}
                {m.scores && (
                  <div style={{ marginTop: 4, fontSize: 11, color: "#665c4f", fontFamily: "'JetBrains Mono', monospace" }}>
                    詳細スコアあり
                  </div>
                )}
              </div>
              <div>
                {confirmId === m.id ? (
                  <div style={{ display: "flex", gap: 6 }}>
                    <button
                      onClick={() => { onDelete(m.id); setConfirmId(null); }}
                      style={{ background: "#a8524a", color: "#ede4d3", border: "none", borderRadius: 6, padding: "6px 10px", fontFamily: "'Inter', sans-serif", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                    >
                      本当に削除
                    </button>
                    <button
                      onClick={() => setConfirmId(null)}
                      style={{ background: "transparent", color: "#a89a86", border: "1px solid #4a4136", borderRadius: 6, padding: "6px 10px", fontFamily: "'Inter', sans-serif", fontSize: 12, cursor: "pointer" }}
                    >
                      キャンセル
                    </button>
                  </div>
                ) : (
                  <button
                    onClick={() => setConfirmId(m.id)}
                    style={{ background: "transparent", color: "#c07a6f", border: "1px solid #a8524a55", borderRadius: 6, padding: "6px 10px", fontFamily: "'Inter', sans-serif", fontSize: 12, cursor: "pointer" }}
                  >
                    削除
                  </button>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  useFonts();
  const [matches, setMatches] = useState([]);
  const [ready, setReady] = useState(false);
  const [tab, setTab] = useState("board");

  useEffect(() => {
    (async () => {
      try {
        const loaded = await loadMatches();
        setMatches(loaded);
      } catch (e) {
        // 初回でデータが無い場合などはここに来る
      }
      setReady(true);
    })();
  }, []);

  const persist = useCallback(async (next) => {
    setMatches(next);
    try {
      await saveMatches(next);
    } catch (e) {
      console.error("保存に失敗しました", e);
    }
  }, []);

  const handleAddMatch = (m) => {
    persist([...matches, m]);
  };

  const handleDeleteMatch = (id) => {
    persist(matches.filter((m) => m.id !== id));
  };

  const agg = useMemo(() => computeAggregates(matches), [matches]);

  if (!ready) {
    return <div style={{ padding: 40, color: "#a89a86", fontFamily: "'Inter', sans-serif" }}>読み込み中...</div>;
  }

  const tabs = [
    { id: "board", label: "リーダーボード" },
    { id: "add", label: "試合を記録" },
    { id: "history", label: "試合履歴" },
    { id: "build", label: "チーム分け提案" },
    { id: "synergy", label: "相性データ" },
  ];

  return (
    <div style={{ background: "#1b1712", minHeight: "100%", padding: 24, borderRadius: 12 }}>
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontFamily: "'Cinzel', serif", fontWeight: 700, fontSize: 24, color: "#d9b34a", letterSpacing: "0.03em" }}>
          AOE2 チーム分けトラッカー
        </div>
        <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: "#665c4f", marginTop: 2 }}>
          記録試合数: {matches.length} (シード: 過去221戦)
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 24, borderBottom: "1px solid #3a3128", paddingBottom: 12 }}>
        {tabs.map((t) => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              background: tab === t.id ? "#2a2420" : "transparent",
              color: tab === t.id ? "#d9b34a" : "#a89a86",
              border: tab === t.id ? "1px solid #d9b34a55" : "1px solid transparent",
              borderRadius: 8,
              padding: "8px 16px",
              fontFamily: "'Cinzel', serif",
              fontWeight: 700,
              fontSize: 13,
              letterSpacing: "0.02em",
              cursor: "pointer",
            }}
          >
            {t.label}
          </button>
        ))}
      </div>

      {tab === "board" && <Leaderboard agg={agg} />}
      {tab === "add" && <AddMatch agg={agg} onSave={handleAddMatch} />}
      {tab === "history" && <MatchHistory matches={matches} onDelete={handleDeleteMatch} />}
      {tab === "build" && <TeamBuilder agg={agg} />}
      {tab === "synergy" && <Synergy agg={agg} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
